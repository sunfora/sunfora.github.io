    <style>

        left:  calc(15rem / 16);
        width: calc(75rem / 16);
      }
      h1 {
        padding:     calc(10rem / 16);
        margin-top:  calc(30rem / 16);
        margin-left: calc(25rem / 16);

      nav {
        margin-left: calc(25rem / 16);
        font-size:   calc(14rem / 16);
      }
      nav h2 {
        font-weight: 300;
      }
      nav ul {
        font-family: sans-serif;
        list-style-type: square;
        padding-left: calc(25rem / 16);

      nav ul a {
        color: black;

      }

      }
      #alt-name a {
