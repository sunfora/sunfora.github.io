<!doctype>
<html lang="en" >
  <head>
    <meta charset="UTF-8">
    <title>Shipwreck</title>
    <script>
      document.documentElement.className = "js";
    </script>

    <style>
      :root {
        font-size: calc(16px * 170/100);
        font-family: "Noto Serif", serif;
      }

      #hat {
        position: absolute;
        top:   calc(10rem / 16);
        left:  calc(15rem / 16);
        width: calc(75rem / 16);
      }
      
      .js #hat {
        display: none;
      }
      .js #hat.bounce-in-down {
        animation: bounceInDown 1.2s both;
      }

      @keyframes bounceInDown {
        0% {
          transform: translateY(calc(-500rem/16));
          animation-timing-function: ease-in;
        }
        60% {
          transform: translateY(0);
          animation-timing-function: ease-out;
        }
        75% {
          transform: translateY(calc(-20rem/16));
          animation-timing-function: ease-in;
        }
        90% {
          transform: translateY(0);
          animation-timing-function: ease-out;
        }
        95% {
          transform: translateY(calc(-2rem/16));
          animation-timing-function: ease-in;
        }
        100% {
          transform: translateY(0);
        }
      }

      h1 {
        padding:     calc(10rem / 16);
        margin-top:  calc(30rem / 16);
        margin-left: calc(25rem / 16);
      }
      
      nav {
        margin-left: calc(25rem / 16);
        font-size:   calc(14rem / 16);
      }
      nav h2 {
        font-weight: 300;
      }
      nav ul {
        font-family: sans-serif;
        list-style-type: square;
        padding-left: calc(25rem / 16);
      }

      nav ul a {
        color: black;
        text-decoration: none;
      }
      nav ul a:hover {
        color: darkgrey;
        background: black;
      }

      #alt-name {
        font-weight: 300;
        color: darkgrey;
      }
      #alt-name a {
        color: grey;
        text-decoration: none;
      }
      #alt-name a:hover {
        color: black;
      }
    </style>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const hat = document.querySelector('#hat');
        
        function animate_hat() {
          hat.style.display = "block";
          hat.classList.add("bounce-in-down");
        }
        if (hat.complete) {
          hat.style.display = "block";
        } else {
          hat.addEventListener('load', animate_hat, { once: true });
        }

        hat.addEventListener('click', () => {
          hat.animate(
            [
              { transform: 'scale(1)',   filter: 'brightness(1)'   },
              { transform: 'scale(1.1)', filter: 'brightness(1.2)' },
              { transform: 'scale(1)',   filter: 'brightness(1)'   }
            ], 
            {
              duration: 300,
              easing: 'ease-in-out',
              fill: 'both'
            }
          );
        });
      });
    </script>
  </head>
  

  <body>
    <h1><img id=hat src="assets/hat-small.png" width="125"> kurku's <span id="alt-name">[<a href="https://github.com/sunfora">sunfora</a>]</span> blog</h1>
    <nav>
      <section id="blog-links">
        <h2> Tell me a tale </h2>
        <ul>
          <li> <a href="sicp"      > SICP travel notes </a> </li>
          <li> <a href="bytesanity"> Bytesanity        </a> </li>
        </ul>
      </section>
      <section id="logs">
        <h2> Logs </h2>
        <ul>
          <li> <a href="bug_reports"> Software Bugs           </a> </li>
          <li> <a href="software-i-wish-existed"  > Software I wish existed </a> </li>
        </ul>
      </section>
    </nav>
  </body>
</html>
